<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Conductor Motion — Progress Simulation</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --cm-bg: #0B0F1A;
  --cm-surface: #141824;
  --cm-elevated: #1C2133;
  --cm-card: #242A3D;
  --cm-brand: #4F7BF7;
  --cm-brand-40: rgba(79, 123, 247, 0.4);
  --cm-brand-20: rgba(79, 123, 247, 0.2);
  --cm-text: #E8ECF4;
  --cm-text-70: rgba(232, 236, 244, 0.7);
  --cm-text-40: rgba(232, 236, 244, 0.4);
  --cm-text-20: rgba(232, 236, 244, 0.2);
  --cm-success: #34D399;
  --cm-border: rgba(232, 236, 244, 0.15);
  --cm-border-subtle: rgba(232, 236, 244, 0.08);
  --cm-ease-out-cubic: cubic-bezier(0.33, 1, 0.68, 1);
  --cm-font: 'Geist', system-ui, sans-serif;
  --cm-font-mono: 'Geist Mono', 'SF Mono', monospace;
  --cm-body-size: clamp(0.875rem, 0.5vw + 0.75rem, 1rem);
  --cm-mono-size: clamp(0.75rem, 0.4vw + 0.65rem, 0.875rem);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--cm-bg);
  color: var(--cm-text);
  font-family: var(--cm-font);
  font-size: var(--cm-body-size);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}

.progress-panel {
  width: 100%;
  max-width: 36rem;
  background: var(--cm-surface);
  border: 1px solid var(--cm-border-subtle);
  border-radius: 0.75rem;
  overflow: hidden;
}

.progress-header {
  padding: 1.25rem 1.5rem;
  border-bottom: 1px solid var(--cm-border-subtle);
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--cm-font-mono);
  font-size: var(--cm-mono-size);
}

.progress-title {
  color: var(--cm-text-40);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.progress-counter {
  color: var(--cm-text-70);
}

.progress-bar-wrap {
  padding: 0 1.5rem;
  padding-top: 1rem;
}

.progress-bar-track {
  height: 4px;
  background: var(--cm-elevated);
  border-radius: 2px;
  overflow: hidden;
  position: relative;
}

.progress-bar-fill {
  height: 100%;
  width: 5%;
  background: var(--cm-brand);
  border-radius: 2px;
  transition: none;
}

.progress-percent {
  text-align: right;
  font-family: var(--cm-font-mono);
  font-size: var(--cm-mono-size);
  color: var(--cm-text-40);
  padding: 0.5rem 1.5rem 0;
}

.data-stack {
  padding: 1rem 1.5rem 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 0;
}

.data-row {
  display: none;
  align-items: baseline;
  width: 100%;
  gap: 0;
  font-family: var(--cm-font-mono);
  font-size: var(--cm-mono-size);
  padding: 0.35rem 0;
}

.data-row.is-reveal {
  opacity: 0;
  transform: translateY(10px);
  transition: opacity 420ms ease, transform 420ms ease;
}

.data-row.is-reveal.is-in {
  opacity: 1;
  transform: translateY(0);
}

.data-time {
  flex: 0 0 auto;
  color: var(--cm-text-40);
}

.data-dots {
  flex: 1 1 auto;
  min-width: 0;
  overflow: hidden;
  white-space: nowrap;
  color: var(--cm-text-20);
  margin: 0;
}

.data-label {
  flex: 0 0 auto;
  color: var(--cm-text-70);
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.data-processing {
  display: flex;
  align-items: center;
  padding: 0.75rem 0 0;
  font-family: var(--cm-font-mono);
  font-size: var(--cm-mono-size);
  color: var(--cm-brand);
}

.data-processing .spinner {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 1.5px solid var(--cm-brand-40);
  border-top-color: var(--cm-brand);
  border-radius: 50%;
  animation: spin 800ms linear infinite;
  margin-right: 0.5rem;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

@media (prefers-reduced-motion: reduce) {
  .data-row.is-reveal {
    opacity: 1;
    transform: none;
    transition: none;
  }
  .data-processing .spinner {
    animation: none;
    border-color: var(--cm-brand);
  }
}
</style>
</head>
<body>

<div class="progress-panel" data-progress-root>
  <div class="progress-header">
    <span class="progress-title">search initialization</span>
    <span class="progress-counter">0 documents</span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-track" role="progressbar" aria-valuenow="5" aria-valuemin="0" aria-valuemax="100">
      <div class="progress-bar-fill"></div>
    </div>
  </div>
  <div class="progress-percent">5%</div>
  <div class="data-stack">
    <div class="data-row">
      <span class="data-time">[10:14:02]</span>
      <span class="data-dots"></span>
      <span class="data-label">QUERY_RECEIVED</span>
    </div>
    <div class="data-row">
      <span class="data-time">[10:14:31]</span>
      <span class="data-dots"></span>
      <span class="data-label">INPUT</span>
    </div>
    <div class="data-row">
      <span class="data-time">[10:14:42]</span>
      <span class="data-dots"></span>
      <span class="data-label">ELECTRONIC SIGNATURE</span>
    </div>
    <div class="data-row">
      <span class="data-time">[10:14:57]</span>
      <span class="data-dots"></span>
      <span class="data-label">JURISDICTION</span>
    </div>
    <div class="data-processing">
      <span class="spinner" aria-hidden="true"></span>
      <span class="processing-text">PROCESSING</span>
    </div>
  </div>
</div>

<script>
(() => {
  const TOTAL_MS = 6000;
  const START_PROGRESS = 5;
  const END_PROGRESS = 100;
  const TARGET_DOC_COUNT = 1324;
  const ROW_STAGGER = [900, 1800, 2700, 3600];
  const DOTS_CYCLE_MS = 420;

  const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const easeOutCubic = t => 1 - Math.pow(1 - t, 3);
  const clamp = (n, min, max) => Math.max(min, Math.min(max, n));

  function formatNumber(num) {
    return new Intl.NumberFormat('en-US').format(Math.round(num));
  }

  function initProgress(root) {
    if (!root || root.dataset.progressInit === 'true') return;
    root.dataset.progressInit = 'true';

    let paused = false;
    document.addEventListener('visibilitychange', () => {
      paused = document.hidden;
    });

    const counterEl = root.querySelector('.progress-counter');
    const fillEl = root.querySelector('.progress-bar-fill');
    const percentEl = root.querySelector('.progress-percent');
    const processingTextEl = root.querySelector('.processing-text');
    const rows = Array.from(root.querySelectorAll('.data-row'));

    if (reducedMotion) {
      if (fillEl) fillEl.style.width = '100%';
      if (percentEl) percentEl.textContent = '100%';
      if (counterEl) counterEl.textContent = `${formatNumber(TARGET_DOC_COUNT)} documents`;
      rows.forEach(row => {
        row.style.display = 'flex';
        row.style.opacity = '1';
        row.style.transform = 'none';
      });
      if (processingTextEl) processingTextEl.textContent = 'COMPLETE';
      return;
    }

    rows.forEach(row => {
      row.classList.add('is-reveal');
      row.style.display = 'none';
    });

    function measureDots(dotsEl) {
      if (!dotsEl) return;
      dotsEl.textContent = '';
      const width = dotsEl.clientWidth;
      if (!width) return;
      const probe = document.createElement('span');
      probe.textContent = '.';
      probe.style.visibility = 'hidden';
      probe.style.position = 'absolute';
      probe.style.whiteSpace = 'pre';
      probe.style.fontFamily = getComputedStyle(dotsEl).fontFamily;
      probe.style.fontSize = getComputedStyle(dotsEl).fontSize;
      document.body.appendChild(probe);
      const dotWidth = probe.getBoundingClientRect().width || 6;
      probe.remove();
      const count = Math.max(0, Math.floor(width / dotWidth));
      dotsEl.textContent = '.'.repeat(count);
    }

    function updateAllDots() {
      rows.forEach(row => measureDots(row.querySelector('.data-dots')));
    }

    requestAnimationFrame(() => {
      rows.forEach((row, index) => {
        const delay = ROW_STAGGER[index] || (index * 900);
        setTimeout(() => {
          row.style.display = 'flex';
          measureDots(row.querySelector('.data-dots'));
          requestAnimationFrame(() => {
            row.classList.add('is-in');
            updateAllDots();
          });
        }, delay);
      });
    });

    let dotsCount = 0;
    const dotsInterval = setInterval(() => {
      dotsCount = (dotsCount + 1) % 4;
      if (processingTextEl) processingTextEl.textContent = 'PROCESSING' + '.'.repeat(dotsCount);
    }, DOTS_CYCLE_MS);

    let start = performance.now();
    let pauseStart = 0;

    function tick(now) {
      if (paused) { if (!pauseStart) pauseStart = now; requestAnimationFrame(tick); return; }
      if (pauseStart) { start += now - pauseStart; pauseStart = 0; }
      const rawT = clamp((now - start) / TOTAL_MS, 0, 1);
      const eased = easeOutCubic(rawT);

      const progressValue = START_PROGRESS + ((END_PROGRESS - START_PROGRESS) * eased);

      if (fillEl) fillEl.style.width = progressValue + '%';
      if (percentEl) percentEl.textContent = Math.round(progressValue) + '%';
      if (counterEl) counterEl.textContent = `${formatNumber(TARGET_DOC_COUNT * eased)} documents`;
      const track = root.querySelector('.progress-bar-track');
      if (track) track.setAttribute('aria-valuenow', Math.round(progressValue));

      if (rawT < 1) {
        requestAnimationFrame(tick);
      } else {
        if (fillEl) fillEl.style.width = '100%';
        if (percentEl) percentEl.textContent = '100%';
        if (counterEl) counterEl.textContent = `${formatNumber(TARGET_DOC_COUNT)} documents`;
        clearInterval(dotsInterval);
        if (processingTextEl) processingTextEl.textContent = 'COMPLETE';
        updateAllDots();
      }
    }

    requestAnimationFrame(tick);

    let resizeTimer = null;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(updateAllDots, 80);
    });
  }

  const root = document.querySelector('[data-progress-root]');
  if (root) initProgress(root);
})();
</script>
</body>
</html>
