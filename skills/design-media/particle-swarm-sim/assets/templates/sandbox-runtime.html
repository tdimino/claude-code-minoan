<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Particle Swarm Simulator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050508;
    color: #e0e0e0;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  #canvas-container {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  canvas { display: block; }

  #hud {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 10;
    pointer-events: none;
  }

  #hud-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #a8d8ff;
    margin-bottom: 4px;
  }

  #hud-description {
    font-size: 11px;
    color: #888;
    max-width: 300px;
    line-height: 1.4;
  }

  #hud-fps {
    position: fixed;
    top: 24px;
    right: 24px;
    font-size: 10px;
    color: #555;
    z-index: 10;
    pointer-events: none;
  }

  #controls-panel {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 8px;
    min-width: 220px;
  }

  .control-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .control-label {
    font-size: 10px;
    color: #777;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    min-width: 80px;
  }

  .control-value {
    font-size: 10px;
    color: #a8d8ff;
    min-width: 36px;
    text-align: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    appearance: none;
    flex: 1;
    height: 2px;
    background: #333;
    border-radius: 1px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: #a8d8ff;
    cursor: pointer;
  }

  #code-editor {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 10;
    width: 380px;
  }

  #code-editor-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    background: rgba(20, 20, 28, 0.9);
    border: 1px solid #222;
    border-bottom: none;
    border-radius: 6px 6px 0 0;
  }

  #code-editor-header span {
    font-size: 10px;
    color: #666;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  #run-btn {
    font-size: 10px;
    padding: 4px 12px;
    background: #1a3a2a;
    color: #6fc;
    border: 1px solid #2a4a3a;
    border-radius: 3px;
    cursor: pointer;
    font-family: inherit;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  #run-btn:hover { background: #2a4a3a; }

  #code-textarea {
    width: 100%;
    height: 200px;
    background: rgba(12, 12, 18, 0.95);
    color: #c8c8d0;
    border: 1px solid #222;
    border-radius: 0 0 6px 6px;
    padding: 12px;
    font-family: inherit;
    font-size: 11px;
    line-height: 1.5;
    resize: vertical;
    outline: none;
    tab-size: 2;
  }

  #code-textarea:focus { border-color: #444; }

  #error-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 8px 24px;
    background: rgba(80, 20, 20, 0.95);
    color: #ff8888;
    font-size: 11px;
    z-index: 20;
    display: none;
  }

  #gesture-status {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 10px;
    color: #555;
    z-index: 10;
    pointer-events: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .annotation-label {
    position: absolute;
    font-size: 9px;
    color: #a8d8ff;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 0 6px rgba(0, 0, 0, 0.8);
    z-index: 5;
  }

  #pause-indicator {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    display: none;
    z-index: 15;
    pointer-events: none;
  }

  @media (max-width: 768px) {
    #code-editor { display: none; }
    #controls-panel { bottom: 12px; left: 12px; min-width: 180px; }
    #hud { top: 12px; left: 12px; }
  }
</style>
</head>
<body>

<div id="canvas-container"></div>

<div id="hud">
  <div id="hud-title">PARTICLE SWARM</div>
  <div id="hud-description">Initializing...</div>
</div>

<div id="hud-fps"></div>

<div id="controls-panel"></div>

<div id="code-editor">
  <div id="code-editor-header">
    <span>Behavior Function</span>
    <button id="run-btn">Run</button>
  </div>
  <textarea id="code-textarea" spellcheck="false"></textarea>
</div>

<div id="gesture-status"></div>
<div id="pause-indicator">PAUSED</div>
<div id="error-bar"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════════════
// CONFIGURATION
// ═══════════════════════════════════════════════════════════

const CONFIG = {
  particleCount: 20000,
  particleSize: 0.06,
  backgroundColor: 0x050508,
  autoOrbitSpeed: 0.1,
  cameraRadius: 30,
  cameraFov: 60,
  gestureEnabled: true,
  injectionEnabled: true,
  fogDensity: 0.008,
  dprCap: 2,
};

// ═══════════════════════════════════════════════════════════
// DEFAULT SIMULATION
// ═══════════════════════════════════════════════════════════

const DEFAULT_SIM = `const speed = addControl('speed', 'Speed', 0.1, 5.0, 1.0);
const scale = addControl('scale', 'Scale', 5, 40, 15);

if (i === 0) setInfo('Expanding Sphere', 'Uniform distribution pulsing on sphere surface');

const phi = (i / count) * Math.PI * 2 * 10;
const theta = Math.acos(1 - 2 * (i / count));
const r = scale + Math.sin(time * speed + i * 0.01) * 3;

target.set(
  r * Math.sin(theta) * Math.cos(phi),
  r * Math.sin(theta) * Math.sin(phi),
  r * Math.cos(theta)
);
color.setHSL(i / count, 0.8, 0.5 + 0.2 * Math.sin(time + i * 0.1));`;

// ═══════════════════════════════════════════════════════════
// SECURITY VALIDATOR
// ═══════════════════════════════════════════════════════════

const FORBIDDEN_PATTERNS = [
  /\bdocument\b/, /\bwindow\b/, /\bfetch\b/, /\bXMLHttpRequest\b/, /\bWebSocket\b/,
  /\beval\b/, /\bFunction\s*\(/, /\bimport\s*\(/, /\brequire\s*\(/, /\bprocess\b/,
  /\b__proto__\b/, /\.prototype\b/, /\bglobalThis\b/, /\bself\b/, /\blocation\b/, /\bnavigator\b/,
  /\blocalStorage\b/, /\bsessionStorage\b/, /\bindexedDB\b/, /\bcrypto\b/,
  /\bsetTimeout\b/, /\bsetInterval\b/, /\balert\s*\(/, /\bconfirm\s*\(/, /\bprompt\s*\(/,
  /\.constructor\b/, /\bReflect\b/, /\bProxy\b/, /\bthis\s*\[/,
  /\bwhile\s*\(\s*true\s*\)/, /\bfor\s*\(\s*;\s*;\s*\)/,
];

const SAFE_THREE = Object.freeze({
  Vector3: THREE.Vector3,
  Color: THREE.Color,
  MathUtils: Object.freeze({ ...THREE.MathUtils }),
});

function validateCode(code) {
  for (const pattern of FORBIDDEN_PATTERNS) {
    const match = code.match(pattern);
    if (match) {
      return { valid: false, error: `Forbidden pattern: "${match[0]}"` };
    }
  }

  try {
    new Function('i', 'count', 'time', 'THREE', 'target', 'color', 'addControl', 'setInfo', 'annotate', code);
  } catch (e) {
    return { valid: false, error: `Syntax error: ${e.message}` };
  }

  const mockTarget = new THREE.Vector3();
  const mockColor = new THREE.Color();
  const mockAddControl = () => 1;
  const mockSetInfo = () => {};
  const mockAnnotate = () => {};

  try {
    const testFn = new Function('i', 'count', 'time', 'THREE', 'target', 'color', 'addControl', 'setInfo', 'annotate', code);
    const dryRunStart = performance.now();
    for (let frame = 0; frame < 3; frame++) {
      for (let testI = 0; testI < 10; testI++) {
        if (performance.now() - dryRunStart > 500) {
          return { valid: false, error: 'Dry-run timeout: execution took too long (possible infinite loop)' };
        }
        testFn(testI, 100, frame * 0.016, SAFE_THREE, mockTarget, mockColor, mockAddControl, mockSetInfo, mockAnnotate);
        if (!isFinite(mockTarget.x) || !isFinite(mockTarget.y) || !isFinite(mockTarget.z)) {
          return { valid: false, error: `Non-finite position at particle ${testI}, frame ${frame}` };
        }
        if (!isFinite(mockColor.r) || !isFinite(mockColor.g) || !isFinite(mockColor.b)) {
          return { valid: false, error: `Non-finite color at particle ${testI}, frame ${frame}` };
        }
      }
    }
  } catch (e) {
    return { valid: false, error: `Runtime error: ${e.message}` };
  }

  return { valid: true };
}

// ═══════════════════════════════════════════════════════════
// SCENE SETUP
// ═══════════════════════════════════════════════════════════

let scene, camera, renderer, clock;
let particles, positions, colors;
let simFunction = null;
let isPaused = false;

const controlValues = {};
const controlElements = {};
const annotationElements = {};

function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(CONFIG.backgroundColor);
  scene.fog = new THREE.FogExp2(CONFIG.backgroundColor, CONFIG.fogDensity);

  camera = new THREE.PerspectiveCamera(CONFIG.cameraFov, window.innerWidth / window.innerHeight, 0.1, 500);
  camera.position.set(0, 0, CONFIG.cameraRadius);

  try {
    renderer = new THREE.WebGLRenderer({ antialias: true });
  } catch (e) {
    document.body.innerHTML = '<p style="color:#888;padding:48px;font-family:monospace">WebGL not available</p>';
    return;
  }

  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, CONFIG.dprCap));
  document.getElementById('canvas-container').appendChild(renderer.domElement);

  clock = new THREE.Clock();
  createParticles();
  setupInput();
  setupCodeEditor();

  if (CONFIG.gestureEnabled) setupGestureOS();

  injectCode(DEFAULT_SIM);
  document.getElementById('code-textarea').value = DEFAULT_SIM;

  window.addEventListener('resize', onResize);
  animate();
}

// ═══════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════

function createParticles() {
  const geometry = new THREE.BufferGeometry();
  positions = new Float32Array(CONFIG.particleCount * 3);
  colors = new Float32Array(CONFIG.particleCount * 3);

  for (let i = 0; i < CONFIG.particleCount; i++) {
    const phi = Math.acos(1 - 2 * Math.random());
    const theta = Math.PI * 2 * Math.random();
    const r = 5 + Math.random() * 10;
    positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
    positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
    positions[i * 3 + 2] = r * Math.cos(phi);
    colors[i * 3] = 0.4;
    colors[i * 3 + 1] = 0.4;
    colors[i * 3 + 2] = 0.5;
  }

  geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

  const material = new THREE.PointsMaterial({
    size: CONFIG.particleSize,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    transparent: true,
    opacity: 0.85,
    depthWrite: false,
    sizeAttenuation: true,
  });

  particles = new THREE.Points(geometry, material);
  scene.add(particles);
}

// ═══════════════════════════════════════════════════════════
// CAMERA SYSTEM
// ═══════════════════════════════════════════════════════════

let cameraTheta = 0;
let cameraPhi = Math.PI / 2;
let cameraTargetRadius = CONFIG.cameraRadius;
let cameraCurrentRadius = CONFIG.cameraRadius;
let isInteracting = false;
let lastInteraction = 0;
const INTERACTION_COOLDOWN = 4000;

function updateCamera(delta) {
  const now = performance.now();
  if (!isInteracting && now - lastInteraction > INTERACTION_COOLDOWN) {
    cameraTheta += CONFIG.autoOrbitSpeed * delta;
  }

  cameraCurrentRadius += (cameraTargetRadius - cameraCurrentRadius) * 0.05;

  camera.position.x = cameraCurrentRadius * Math.sin(cameraPhi) * Math.cos(cameraTheta);
  camera.position.y = cameraCurrentRadius * Math.cos(cameraPhi);
  camera.position.z = cameraCurrentRadius * Math.sin(cameraPhi) * Math.sin(cameraTheta);
  camera.lookAt(0, 0, 0);
}

// ═══════════════════════════════════════════════════════════
// INPUT HANDLERS
// ═══════════════════════════════════════════════════════════

let pointerDown = false;
let pointerX = 0;
let pointerY = 0;
let simSpeed = 1.0;

function setupInput() {
  const el = renderer.domElement;

  el.addEventListener('pointerdown', (e) => {
    if (e.target !== el) return;
    pointerDown = true;
    pointerX = e.clientX;
    pointerY = e.clientY;
    isInteracting = true;
    lastInteraction = performance.now();
  });

  el.addEventListener('pointermove', (e) => {
    if (!pointerDown) return;
    const dx = e.clientX - pointerX;
    const dy = e.clientY - pointerY;
    cameraTheta -= dx * 0.005;
    cameraPhi = Math.max(0.1, Math.min(Math.PI - 0.1, cameraPhi - dy * 0.005));
    pointerX = e.clientX;
    pointerY = e.clientY;
    lastInteraction = performance.now();
  });

  el.addEventListener('pointerup', () => {
    pointerDown = false;
    isInteracting = false;
    lastInteraction = performance.now();
  });

  el.addEventListener('wheel', (e) => {
    e.preventDefault();
    cameraTargetRadius = Math.max(5, Math.min(100, cameraTargetRadius + e.deltaY * 0.02));
    lastInteraction = performance.now();
  }, { passive: false });

  let touchStartDist = 0;
  el.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      touchStartDist = Math.sqrt(dx * dx + dy * dy);
    }
  }, { passive: true });

  el.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2) {
      const dx = e.touches[0].clientX - e.touches[1].clientX;
      const dy = e.touches[0].clientY - e.touches[1].clientY;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const delta = dist - touchStartDist;
      cameraTargetRadius = Math.max(5, Math.min(100, cameraTargetRadius - delta * 0.05));
      touchStartDist = dist;
      lastInteraction = performance.now();
    }
  }, { passive: true });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'TEXTAREA') return;
    if (e.code === 'Space') {
      e.preventDefault();
      isPaused = !isPaused;
      document.getElementById('pause-indicator').style.display = isPaused ? 'block' : 'none';
    }
    if (e.code === 'KeyR') {
      cameraTheta = 0;
      cameraPhi = Math.PI / 2;
      cameraTargetRadius = CONFIG.cameraRadius;
    }
  });
}

// ═══════════════════════════════════════════════════════════
// CODE INJECTION
// ═══════════════════════════════════════════════════════════

function injectCode(code) {
  const result = validateCode(code);
  const errorBar = document.getElementById('error-bar');

  if (!result.valid) {
    errorBar.textContent = result.error;
    errorBar.style.display = 'block';
    return false;
  }

  errorBar.style.display = 'none';

  Object.keys(controlElements).forEach(id => {
    const el = controlElements[id];
    if (el && el.parentElement) el.parentElement.remove();
  });
  Object.keys(controlElements).forEach(id => delete controlElements[id]);
  Object.keys(controlValues).forEach(id => delete controlValues[id]);

  Object.keys(annotationElements).forEach(id => {
    annotationElements[id].remove();
    delete annotationElements[id];
  });

  simSpeed = 1.0;

  try {
    simFunction = new Function(
      'i', 'count', 'time', 'THREE', 'target', 'color',
      'addControl', 'setInfo', 'annotate',
      code
    );
    return true;
  } catch (e) {
    errorBar.textContent = `Compilation error: ${e.message}`;
    errorBar.style.display = 'block';
    return false;
  }
}

function setupCodeEditor() {
  if (!CONFIG.injectionEnabled) {
    document.getElementById('code-editor').style.display = 'none';
    return;
  }

  document.getElementById('run-btn').addEventListener('click', () => {
    const code = document.getElementById('code-textarea').value;
    injectCode(code);
  });

  document.getElementById('code-textarea').addEventListener('keydown', (e) => {
    if (e.key === 'Tab') {
      e.preventDefault();
      const ta = e.target;
      const start = ta.selectionStart;
      ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(ta.selectionEnd);
      ta.selectionStart = ta.selectionEnd = start + 2;
    }
    if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') {
      e.preventDefault();
      document.getElementById('run-btn').click();
    }
  });
}

// ═══════════════════════════════════════════════════════════
// API HELPERS
// ═══════════════════════════════════════════════════════════

function addControl(id, label, min, max, initial) {
  if (controlElements[id]) {
    return controlValues[id];
  }

  controlValues[id] = initial;

  const row = document.createElement('div');
  row.className = 'control-row';

  const labelEl = document.createElement('span');
  labelEl.className = 'control-label';
  labelEl.textContent = label;

  const input = document.createElement('input');
  input.type = 'range';
  input.min = min;
  input.max = max;
  input.step = (max - min) / 200;
  input.value = initial;

  const valueEl = document.createElement('span');
  valueEl.className = 'control-value';
  valueEl.textContent = initial.toFixed(1);

  input.addEventListener('input', () => {
    controlValues[id] = parseFloat(input.value);
    valueEl.textContent = controlValues[id].toFixed(1);
  });

  row.appendChild(labelEl);
  row.appendChild(input);
  row.appendChild(valueEl);
  document.getElementById('controls-panel').appendChild(row);

  controlElements[id] = row;
  return controlValues[id];
}

function setInfo(title, description) {
  document.getElementById('hud-title').textContent = title;
  document.getElementById('hud-description').textContent = description;
}

const annotationScratch = new THREE.Vector3();

function annotate(id, x, y, z, labelText) {
  if (!annotationElements[id]) {
    const el = document.createElement('div');
    el.className = 'annotation-label';
    document.body.appendChild(el);
    annotationElements[id] = el;
  }

  const el = annotationElements[id];
  el.textContent = labelText;

  annotationScratch.set(x, y, z).project(camera);
  if (annotationScratch.z > 1) {
    el.style.display = 'none';
    return;
  }

  const sx = (annotationScratch.x * 0.5 + 0.5) * innerWidth;
  const sy = (-annotationScratch.y * 0.5 + 0.5) * innerHeight;
  el.style.left = sx + 'px';
  el.style.top = sy + 'px';
  el.style.display = 'block';
}

// ═══════════════════════════════════════════════════════════
// GESTURE OS (MediaPipe Hands)
// ═══════════════════════════════════════════════════════════

let gestureFrame = 0;
let lastGestureX = 0;
let lastGestureY = 0;
let currentGesture = 'none';

async function setupGestureOS() {
  const statusEl = document.getElementById('gesture-status');

  try {
    const { Hands } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.js');
    const { Camera: MPCamera } = await import('https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js');

    const video = document.createElement('video');
    video.style.display = 'none';
    document.body.appendChild(video);

    const hands = new Hands({
      locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`,
    });

    hands.setOptions({
      maxNumHands: 1,
      modelComplexity: 0,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5,
    });

    hands.onResults(onGestureResults);

    const mpCamera = new MPCamera(video, {
      onFrame: async () => {
        gestureFrame++;
        if (gestureFrame % 3 === 0) {
          await hands.send({ image: video });
        }
      },
      width: 320,
      height: 240,
    });

    await mpCamera.start();
    statusEl.textContent = 'GESTURE OS READY';
    setTimeout(() => { statusEl.style.opacity = '0'; }, 3000);
  } catch (e) {
    statusEl.textContent = 'GESTURE OS UNAVAILABLE';
    statusEl.style.color = '#553333';
    setTimeout(() => { statusEl.style.opacity = '0'; }, 3000);
  }
}

function classifyGesture(landmarks) {
  const tips = [8, 12, 16, 20];
  const pips = [6, 10, 14, 18];
  const extended = tips.map((tip, j) => landmarks[tip].y < landmarks[pips[j]].y);

  const indexUp = extended[0];
  const middleUp = extended[1];
  const ringUp = extended[2];
  const pinkyUp = extended[3];

  if (indexUp && middleUp && ringUp && pinkyUp) return 'palm';
  if (indexUp && middleUp && !ringUp && !pinkyUp) return 'peace';
  if (indexUp && !middleUp && !ringUp && !pinkyUp) return 'finger';
  if (!indexUp && !middleUp && !ringUp && !pinkyUp) return 'fist';
  return 'none';
}

function onGestureResults(results) {
  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    currentGesture = 'none';
    return;
  }

  const landmarks = results.multiHandLandmarks[0];
  const gesture = classifyGesture(landmarks);
  const centerX = landmarks[9].x;
  const centerY = landmarks[9].y;

  if (gesture !== currentGesture) {
    if (gesture === 'fist' && currentGesture !== 'fist') {
      isPaused = !isPaused;
      document.getElementById('pause-indicator').style.display = isPaused ? 'block' : 'none';
    }
    currentGesture = gesture;
    lastGestureX = centerX;
    lastGestureY = centerY;
    return;
  }

  const dx = centerX - lastGestureX;
  const dy = centerY - lastGestureY;
  const deadZone = 0.01;

  if (gesture === 'finger') {
    if (Math.abs(dx) > deadZone || Math.abs(dy) > deadZone) {
      cameraTheta += dx * 3;
      cameraPhi = Math.max(0.1, Math.min(Math.PI - 0.1, cameraPhi + dy * 2));
      isInteracting = true;
      lastInteraction = performance.now();
    }
  } else if (gesture === 'palm') {
    if (Math.abs(dx) > deadZone) {
      cameraTargetRadius = Math.max(5, Math.min(100, cameraTargetRadius - dx * 50));
      lastInteraction = performance.now();
    }
  } else if (gesture === 'peace') {
    if (Math.abs(dx) > deadZone) {
      simSpeed = Math.max(0.1, Math.min(5.0, simSpeed + dx * 2));
    }
  }

  lastGestureX = centerX;
  lastGestureY = centerY;
}

// ═══════════════════════════════════════════════════════════
// ANIMATION LOOP
// ═══════════════════════════════════════════════════════════

const reusableTarget = new THREE.Vector3();
const reusableColor = new THREE.Color();
let frameCount = 0;
let fpsAccum = 0;
let lastFpsUpdate = 0;

function animate() {
  requestAnimationFrame(animate);

  const delta = clock.getDelta();
  const elapsed = clock.getElapsedTime() * simSpeed;

  if (!isPaused && simFunction) {
    try {
      for (let idx = 0; idx < CONFIG.particleCount; idx++) {
        reusableTarget.set(
          positions[idx * 3],
          positions[idx * 3 + 1],
          positions[idx * 3 + 2]
        );
        reusableColor.setRGB(
          colors[idx * 3],
          colors[idx * 3 + 1],
          colors[idx * 3 + 2]
        );

        simFunction(
          idx, CONFIG.particleCount, elapsed, SAFE_THREE,
          reusableTarget, reusableColor,
          addControl, setInfo, annotate
        );

        if (isFinite(reusableTarget.x) && isFinite(reusableTarget.y) && isFinite(reusableTarget.z)) {
          positions[idx * 3] = reusableTarget.x;
          positions[idx * 3 + 1] = reusableTarget.y;
          positions[idx * 3 + 2] = reusableTarget.z;
        }

        const r = reusableColor.r, g = reusableColor.g, b = reusableColor.b;
        if (isFinite(r) && isFinite(g) && isFinite(b)) {
          colors[idx * 3] = r;
          colors[idx * 3 + 1] = g;
          colors[idx * 3 + 2] = b;
        }
      }
    } catch (e) {
      simFunction = null;
      document.getElementById('error-bar').textContent = `Runtime error: ${e.message}`;
      document.getElementById('error-bar').style.display = 'block';
    }

    particles.geometry.attributes.position.needsUpdate = true;
    particles.geometry.attributes.color.needsUpdate = true;
  }

  updateCamera(delta);

  // FPS counter
  frameCount++;
  fpsAccum += delta;
  if (fpsAccum > 0.5) {
    const fps = Math.round(frameCount / fpsAccum);
    document.getElementById('hud-fps').textContent = fps + ' FPS';
    frameCount = 0;
    fpsAccum = 0;
  }

  renderer.render(scene, camera);
}

function onResize() {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
}

// ═══════════════════════════════════════════════════════════
// LAUNCH
// ═══════════════════════════════════════════════════════════

init();
</script>
