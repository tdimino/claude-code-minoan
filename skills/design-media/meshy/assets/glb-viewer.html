<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GLB Viewer</title>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #c8a96e;
      --accent-dim: rgba(200, 169, 110, 0.15);
      --bg: #111115;
      --text: #e2d8cc;
      --text-muted: #7a6f63;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: var(--text);
    }

    /* ── Canvas ── */

    #canvasContainer {
      position: absolute;
      inset: 0;
      z-index: 1;
    }

    #canvasContainer canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── Drop zone overlay ── */

    #dropZone {
      position: absolute;
      inset: 0;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      background: var(--bg);
      transition: background 0.2s;
    }

    #dropZone.drag-over {
      background: rgba(17, 17, 21, 0.85);
    }

    #dropZone.hidden {
      display: none;
    }

    .drop-icon {
      opacity: 0.35;
    }

    .drop-title {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: var(--text);
      opacity: 0.6;
    }

    .drop-sub {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.02em;
    }

    .drop-border {
      position: absolute;
      inset: 24px;
      border: 1.5px dashed rgba(200, 169, 110, 0.15);
      border-radius: 16px;
      pointer-events: none;
      transition: border-color 0.2s;
    }

    #dropZone.drag-over .drop-border {
      border-color: rgba(200, 169, 110, 0.45);
    }

    /* ── Loading Screen ── */

    #loadingScreen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 20;
      transition: opacity 0.6s ease;
      gap: 20px;
    }

    #loadingScreen.active {
      display: flex;
    }

    #loadingScreen.fade-out {
      opacity: 0;
    }

    .spinner-ring {
      width: 44px;
      height: 44px;
      border: 2px solid rgba(200, 169, 110, 0.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 1.1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .progress-bar {
      width: 180px;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 1px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #e8c987);
      width: 0%;
      transition: width 0.25s ease;
      border-radius: 1px;
    }

    /* ── Viewer Controls ── */

    #viewerControls {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: linear-gradient(to bottom, rgba(8, 8, 12, 0.8) 0%, rgba(8, 8, 12, 0.3) 70%, transparent 100%);
      z-index: 10;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    #viewerControls.visible {
      opacity: 1;
      pointer-events: all;
    }

    body:hover #viewerControls {
      opacity: 1;
      pointer-events: all;
    }

    .controls-left, .controls-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .viewer-badge {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge-label {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 3px 8px;
      border-radius: 5px;
      letter-spacing: 0.08em;
    }

    .badge-name {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      opacity: 0.55;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .ctrl-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 9px;
      background: rgba(12, 12, 18, 0.7);
      color: var(--text);
      cursor: pointer;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      transition: background 0.2s, transform 0.15s, border-color 0.2s, color 0.2s;
      opacity: 0.75;
    }

    .ctrl-btn:hover {
      background: rgba(200, 169, 110, 0.2);
      border-color: rgba(200, 169, 110, 0.25);
      color: var(--accent);
      transform: scale(1.05);
      opacity: 1;
    }

    .ctrl-btn.active {
      background: rgba(200, 169, 110, 0.25);
      border-color: rgba(200, 169, 110, 0.3);
      color: var(--accent);
      opacity: 1;
    }

    .ctrl-btn title { display: none; }

    /* ── Keyboard hints ── */

    #keyHints {
      position: absolute;
      bottom: 20px;
      right: 20px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 5px;
      opacity: 0;
      transition: opacity 0.35s ease;
      pointer-events: none;
    }

    body:hover #keyHints {
      opacity: 1;
    }

    .hint-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .hint-key {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 4px;
      padding: 2px 6px;
      letter-spacing: 0.04em;
    }

    .hint-desc {
      font-size: 10px;
      color: var(--text-muted);
      opacity: 0.6;
      letter-spacing: 0.03em;
    }

    /* ── Error Screen ── */

    #errorScreen {
      position: absolute;
      inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      z-index: 20;
      gap: 14px;
    }

    #errorScreen.active {
      display: flex;
    }

    .error-icon {
      opacity: 0.7;
    }

    .error-text {
      font-size: 14px;
      color: #f4a5a5;
      text-align: center;
      max-width: 320px;
      line-height: 1.5;
    }

    .error-sub {
      font-size: 12px;
      color: var(--text-muted);
      text-align: center;
      max-width: 320px;
    }
  </style>
</head>
<body>

  <!-- Canvas -->
  <div id="canvasContainer"></div>

  <!-- Drop zone (shown when no model loaded) -->
  <div id="dropZone">
    <div class="drop-border"></div>
    <svg class="drop-icon" width="52" height="52" viewBox="0 0 52 52" fill="none">
      <rect x="8" y="8" width="36" height="36" rx="8" stroke="#c8a96e" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
      <path d="M26 18v16M26 34l-6-6M26 34l6-6" stroke="#c8a96e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
    </svg>
    <p class="drop-title">Drop a GLB file here</p>
    <p class="drop-sub">or open with ?glb=URL</p>
  </div>

  <!-- Loading -->
  <div id="loadingScreen">
    <div class="spinner-ring"></div>
    <p class="loading-text">Loading model</p>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <!-- Controls overlay -->
  <div id="viewerControls">
    <div class="controls-left">
      <div class="viewer-badge">
        <span class="badge-label">GLB</span>
        <span class="badge-name" id="modelName"></span>
      </div>
    </div>
    <div class="controls-right">
      <button class="ctrl-btn active" id="toggleRotate" title="Toggle auto-rotate (R)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M13 8a5 5 0 1 1-1.8-3.85" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          <path d="M13 2v3h-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="downloadBtn" title="Download GLB (D)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M8 2.5v8M8 10.5l-2.5-2.5M8 10.5l2.5-2.5M2.5 13h11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="ctrl-btn" id="fullscreenBtn" title="Fullscreen (F)">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M2 5.5V3h2.5M13.5 3H11M2 10.5V13h2.5M11 13h2.5v-2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Keyboard hints -->
  <div id="keyHints">
    <div class="hint-row">
      <span class="hint-key">R</span><span class="hint-desc">auto-rotate</span>
    </div>
    <div class="hint-row">
      <span class="hint-key">D</span><span class="hint-desc">download</span>
    </div>
    <div class="hint-row">
      <span class="hint-key">F</span><span class="hint-desc">fullscreen</span>
    </div>
  </div>

  <!-- Error -->
  <div id="errorScreen">
    <svg class="error-icon" width="44" height="44" viewBox="0 0 24 24" fill="none">
      <circle cx="12" cy="12" r="9.5" stroke="#ef4444" stroke-width="1.5"/>
      <path d="M12 7v5" stroke="#ef4444" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="12" cy="15.5" r="0.75" fill="#ef4444"/>
    </svg>
    <p class="error-text" id="errorText">Failed to load model</p>
    <p class="error-sub" id="errorSub"></p>
  </div>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
    import { ShaderPass } from 'three/addons/postprocessing/ShaderPass.js';
    import { SMAAPass } from 'three/addons/postprocessing/SMAAPass.js';
    import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';

    // ── DOM refs ──

    const dropZoneEl   = document.getElementById('dropZone');
    const loadingEl    = document.getElementById('loadingScreen');
    const progressFill = document.getElementById('progressFill');
    const controlsEl   = document.getElementById('viewerControls');
    const keyHintsEl   = document.getElementById('keyHints');
    const errorEl      = document.getElementById('errorScreen');
    const errorText    = document.getElementById('errorText');
    const errorSub     = document.getElementById('errorSub');
    const modelNameEl  = document.getElementById('modelName');
    const toggleRotBtn = document.getElementById('toggleRotate');
    const downloadBtn  = document.getElementById('downloadBtn');
    const fullscreenBtn= document.getElementById('fullscreenBtn');
    const container    = document.getElementById('canvasContainer');

    // ── State ──

    let currentGlbUrl  = null;
    let currentGlbBlob = null;
    let modelObject    = null;

    // ── Parse URL param ──

    const params = new URLSearchParams(window.location.search);
    const glbParam = params.get('glb');

    // ═══════════════════════════════════════════════════════════════════
    // SCENE
    // ═══════════════════════════════════════════════════════════════════

    const BG_COLOR = new THREE.Color(0x111115);

    const scene = new THREE.Scene();
    scene.background = BG_COLOR;
    scene.fog = new THREE.FogExp2(BG_COLOR, 0.045);

    // ── Camera ──

    const camera = new THREE.PerspectiveCamera(36, window.innerWidth / window.innerHeight, 0.01, 200);
    camera.position.set(0, 1.5, 5);

    // ── Renderer ──

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.05;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    container.appendChild(renderer.domElement);

    // ── PBR Environment ──

    const pmremGenerator = new THREE.PMREMGenerator(renderer);
    pmremGenerator.compileEquirectangularShader();
    const roomEnv = new RoomEnvironment();
    const envTexture = pmremGenerator.fromScene(roomEnv, 0.04).texture;
    scene.environment = envTexture;
    roomEnv.dispose();
    pmremGenerator.dispose();

    // ── Background depth sphere ──

    (function createBgSphere() {
      const geo = new THREE.SphereGeometry(50, 32, 32);
      const mat = new THREE.ShaderMaterial({
        side: THREE.BackSide,
        depthWrite: false,
        uniforms: {
          colorCenter: { value: new THREE.Color(0x1c1c22) },
          colorEdge:   { value: new THREE.Color(0x111115) },
        },
        vertexShader: `
          varying vec3 vWorldPos;
          void main() {
            vWorldPos = (modelMatrix * vec4(position, 1.0)).xyz;
            gl_Position = projectionMatrix * viewMatrix * vec4(vWorldPos, 1.0);
          }
        `,
        fragmentShader: `
          uniform vec3 colorCenter;
          uniform vec3 colorEdge;
          varying vec3 vWorldPos;
          void main() {
            vec3 dir = normalize(vWorldPos);
            float t = 1.0 - pow(1.0 - abs(dir.y), 2.0);
            t = mix(t, 1.0, smoothstep(0.0, 0.3, length(dir.xz) - 0.7));
            gl_FragColor = vec4(mix(colorCenter, colorEdge, t), 1.0);
          }
        `,
      });
      const sphere = new THREE.Mesh(geo, mat);
      sphere.renderOrder = -1;
      scene.add(sphere);
    })();

    // ═══════════════════════════════════════════════════════════════════
    // LIGHTING — 7-light museum gallery rig
    // ═══════════════════════════════════════════════════════════════════

    function setupLighting() {
      // 1. Ambient
      scene.add(new THREE.AmbientLight(0xfff5eb, 0.1));

      // 2. Hemisphere
      scene.add(new THREE.HemisphereLight(0xffeedd, 0x1a1a2e, 0.2));

      // 3. Key — warm spotlight, above-right-front, casts shadow
      const key = new THREE.SpotLight(0xffe8d0, 4.5);
      key.position.set(2.5, 5.5, 3);
      key.angle = Math.PI / 5;
      key.penumbra = 0.85;
      key.decay = 1.8;
      key.distance = 25;
      key.castShadow = true;
      key.shadow.mapSize.set(2048, 2048);
      key.shadow.bias = -0.0002;
      key.shadow.normalBias = 0.02;
      key.shadow.radius = 6;
      key.shadow.camera.near = 0.5;
      key.shadow.camera.far = 20;
      scene.add(key);
      scene.add(key.target);

      // 4. Fill — cool spotlight, from left
      const fill = new THREE.SpotLight(0xc8d8ff, 1.0);
      fill.position.set(-3, 3.5, -0.5);
      fill.angle = Math.PI / 4;
      fill.penumbra = 1.0;
      fill.decay = 2.0;
      fill.distance = 20;
      scene.add(fill);

      // 5. Rim — directional, from behind
      const rim = new THREE.DirectionalLight(0xdde4ff, 1.8);
      rim.position.set(-0.5, 3, -4);
      scene.add(rim);

      // 6. Low accent — warm uplight
      const bounce = new THREE.PointLight(0x443322, 0.35, 12, 2);
      bounce.position.set(0, -1.5, 2);
      scene.add(bounce);

      // 7. Secondary top
      const top = new THREE.PointLight(0xfff0e0, 0.4, 15, 2);
      top.position.set(0, 6, 0);
      scene.add(top);
    }

    setupLighting();

    // ═══════════════════════════════════════════════════════════════════
    // ORBIT CONTROLS
    // ═══════════════════════════════════════════════════════════════════

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.04;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 0.8;
    controls.maxPolarAngle = Math.PI / 1.7;
    controls.minPolarAngle = Math.PI / 8;
    controls.minDistance = 0.5;
    controls.maxDistance = 30;
    controls.target.set(0, 0, 0);

    // ── Graceful pause/resume on interaction ──

    let userInteracting = false;
    let interactionTimer = null;
    const savedRotateSpeed = controls.autoRotateSpeed;

    renderer.domElement.addEventListener('pointerdown', () => {
      userInteracting = true;
      controls.autoRotateSpeed = 0;
      if (interactionTimer) clearTimeout(interactionTimer);
    });

    renderer.domElement.addEventListener('pointerup', () => {
      userInteracting = false;
      if (interactionTimer) clearTimeout(interactionTimer);
      interactionTimer = setTimeout(resumeRotate, 1500);
    });

    function resumeRotate() {
      if (userInteracting || !controls.autoRotate) return;
      const start = performance.now();
      const dur = 2000;
      (function ramp() {
        const t = Math.min((performance.now() - start) / dur, 1);
        const ease = 1 - Math.pow(1 - t, 3);
        controls.autoRotateSpeed = savedRotateSpeed * ease;
        if (t < 1 && !userInteracting) requestAnimationFrame(ramp);
      })();
    }

    // ═══════════════════════════════════════════════════════════════════
    // POST-PROCESSING
    // ═══════════════════════════════════════════════════════════════════

    let composer;
    let grainPass;

    function setupPostProcessing() {
      const size = renderer.getSize(new THREE.Vector2());

      composer = new EffectComposer(renderer);
      composer.addPass(new RenderPass(scene, camera));

      // Bloom
      composer.addPass(new UnrealBloomPass(
        new THREE.Vector2(size.x, size.y),
        0.18,   // strength
        0.5,    // radius
        0.85    // threshold
      ));

      // Vignette
      composer.addPass(new ShaderPass({
        uniforms: {
          tDiffuse: { value: null },
          offset:   { value: 1.05 },
          darkness: { value: 1.25 },
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D tDiffuse;
          uniform float offset;
          uniform float darkness;
          varying vec2 vUv;
          void main() {
            vec4 texel = texture2D(tDiffuse, vUv);
            vec2 uv = (vUv - 0.5) * offset;
            float dist = 1.0 - dot(uv, uv);
            float vign = smoothstep(0.0, 1.0, dist);
            texel.rgb *= mix(1.0 - darkness * 0.5, 1.0, vign);
            gl_FragColor = texel;
          }
        `,
      }));

      // Film grain
      grainPass = new ShaderPass({
        uniforms: {
          tDiffuse:  { value: null },
          time:      { value: 0 },
          intensity: { value: 0.025 },
        },
        vertexShader: `
          varying vec2 vUv;
          void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          uniform sampler2D tDiffuse;
          uniform float time;
          uniform float intensity;
          varying vec2 vUv;
          float rand(vec2 co) {
            return fract(sin(dot(co, vec2(12.9898, 78.233))) * 43758.5453);
          }
          void main() {
            vec4 texel = texture2D(tDiffuse, vUv);
            float noise = rand(vUv + fract(time)) * 2.0 - 1.0;
            texel.rgb += noise * intensity;
            gl_FragColor = texel;
          }
        `,
      });
      composer.addPass(grainPass);

      // SMAA
      const smaa = new SMAAPass(
        size.x * renderer.getPixelRatio(),
        size.y * renderer.getPixelRatio()
      );
      composer.addPass(smaa);
    }

    setupPostProcessing();

    // ═══════════════════════════════════════════════════════════════════
    // GROUND PLANE
    // ═══════════════════════════════════════════════════════════════════

    let groundGroup = null;

    function createGroundPlane(bottomY, modelRadius) {
      if (groundGroup) {
        scene.remove(groundGroup);
        groundGroup = null;
      }

      groundGroup = new THREE.Group();
      const pedRadius = Math.max(modelRadius * 1.2, 0.8);

      // Shadow-catching plane
      const shadowPlane = new THREE.Mesh(
        new THREE.PlaneGeometry(30, 30),
        new THREE.ShadowMaterial({ opacity: 0.4 })
      );
      shadowPlane.rotation.x = -Math.PI / 2;
      shadowPlane.position.y = bottomY;
      shadowPlane.receiveShadow = true;
      groundGroup.add(shadowPlane);

      // Radial gradient pedestal
      const pedCanvas = document.createElement('canvas');
      pedCanvas.width = 1024;
      pedCanvas.height = 1024;
      const pCtx = pedCanvas.getContext('2d');
      const pedGrad = pCtx.createRadialGradient(512, 512, 0, 512, 512, 512);
      pedGrad.addColorStop(0,    'rgba(32, 28, 24, 0.88)');
      pedGrad.addColorStop(0.55, 'rgba(26, 23, 20, 0.65)');
      pedGrad.addColorStop(0.82, 'rgba(20, 18, 16, 0.22)');
      pedGrad.addColorStop(1,    'rgba(17, 17, 21, 0)');
      pCtx.fillStyle = pedGrad;
      pCtx.fillRect(0, 0, 1024, 1024);

      const pedTex = new THREE.CanvasTexture(pedCanvas);
      const pedestal = new THREE.Mesh(
        new THREE.CircleGeometry(pedRadius, 128),
        new THREE.MeshStandardMaterial({
          map: pedTex,
          transparent: true,
          roughness: 0.85,
          metalness: 0.02,
          depthWrite: false,
        })
      );
      pedestal.rotation.x = -Math.PI / 2;
      pedestal.position.y = bottomY + 0.001;
      pedestal.receiveShadow = true;
      groundGroup.add(pedestal);

      // Warm glow pool
      const glowCanvas = document.createElement('canvas');
      glowCanvas.width = 512;
      glowCanvas.height = 512;
      const gCtx = glowCanvas.getContext('2d');
      const glowGrad = gCtx.createRadialGradient(256, 256, 0, 256, 256, 256);
      glowGrad.addColorStop(0,   'rgba(255, 215, 160, 0.045)');
      glowGrad.addColorStop(0.4, 'rgba(255, 195, 130, 0.018)');
      glowGrad.addColorStop(1,   'rgba(0, 0, 0, 0)');
      gCtx.fillStyle = glowGrad;
      gCtx.fillRect(0, 0, 512, 512);

      const glow = new THREE.Mesh(
        new THREE.CircleGeometry(pedRadius * 1.6, 128),
        new THREE.MeshBasicMaterial({
          map: new THREE.CanvasTexture(glowCanvas),
          transparent: true,
          depthWrite: false,
          blending: THREE.AdditiveBlending,
        })
      );
      glow.rotation.x = -Math.PI / 2;
      glow.position.y = bottomY + 0.002;
      groundGroup.add(glow);

      scene.add(groundGroup);
    }

    // ═══════════════════════════════════════════════════════════════════
    // MODEL LOADING
    // ═══════════════════════════════════════════════════════════════════

    const loader = new GLTFLoader();

    function showLoading() {
      dropZoneEl.classList.add('hidden');
      loadingEl.classList.add('active');
      loadingEl.classList.remove('fade-out');
      errorEl.classList.remove('active');
      progressFill.style.width = '0%';
    }

    function hideLoading() {
      loadingEl.classList.add('fade-out');
      setTimeout(() => loadingEl.classList.remove('active'), 650);
    }

    function showError(msg, sub) {
      loadingEl.classList.remove('active');
      dropZoneEl.classList.add('hidden');
      errorEl.classList.add('active');
      errorText.textContent = msg || 'Failed to load model';
      errorSub.textContent  = sub || '';
    }

    function setProgress(v) {
      progressFill.style.width = (v * 100).toFixed(1) + '%';
    }

    function loadGlb(url, name) {
      showLoading();
      currentGlbUrl = url;
      if (name) modelNameEl.textContent = name;

      loader.load(
        url,
        (gltf) => onModelLoaded(gltf, name),
        (xhr) => {
          if (xhr.total > 0) setProgress(xhr.loaded / xhr.total);
        },
        (err) => {
          console.error(err);
          showError(
            'Failed to load model',
            err.message || String(err)
          );
        }
      );
    }

    function onModelLoaded(gltf, name) {
      // Remove prior model
      if (modelObject) {
        scene.remove(modelObject);
        modelObject = null;
      }

      const model = gltf.scene;

      // Enable shadows on all meshes
      model.traverse((child) => {
        if (child.isMesh) {
          child.castShadow = true;
          child.receiveShadow = true;
          if (child.material) {
            child.material.envMapIntensity = 1.0;
          }
        }
      });

      // Compute bounding box and center model
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());

      model.position.sub(center);
      model.position.y += size.y / 2;

      scene.add(model);
      modelObject = model;

      // Position camera to fit model
      const maxDim = Math.max(size.x, size.y, size.z);
      const fovRad = THREE.MathUtils.degToRad(camera.fov);
      const dist = (maxDim / 2) / Math.tan(fovRad / 2) * 1.65;

      camera.position.set(dist * 0.6, dist * 0.45, dist);
      camera.near = maxDim * 0.005;
      camera.far  = maxDim * 60;
      camera.updateProjectionMatrix();

      controls.minDistance = maxDim * 0.3;
      controls.maxDistance = maxDim * 12;
      controls.target.set(0, 0, 0);
      controls.update();

      // Ground plane
      const bottomY = -(size.y / 2);
      const modelRadius = Math.max(size.x, size.z) * 0.6;
      createGroundPlane(bottomY, modelRadius);

      // Show controls
      controlsEl.classList.add('visible');
      setTimeout(() => controlsEl.classList.remove('visible'), 3500);

      // Set model name if not provided
      if (!name) {
        modelNameEl.textContent = gltf.scene.name || 'Model';
      }

      hideLoading();
      setProgress(1);
    }

    // ═══════════════════════════════════════════════════════════════════
    // DRAG AND DROP
    // ═══════════════════════════════════════════════════════════════════

    function handleFile(file) {
      if (!file || !file.name.toLowerCase().endsWith('.glb')) {
        showError('Invalid file', 'Please drop a .glb file');
        return;
      }
      currentGlbBlob = file;
      const url = URL.createObjectURL(file);
      const name = file.name.replace(/\.glb$/i, '');
      loadGlb(url, name);
    }

    document.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZoneEl.classList.remove('hidden');
      dropZoneEl.classList.add('drag-over');
    });

    document.addEventListener('dragleave', (e) => {
      if (e.relatedTarget === null) {
        dropZoneEl.classList.remove('drag-over');
        if (modelObject) dropZoneEl.classList.add('hidden');
      }
    });

    document.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZoneEl.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      handleFile(file);
    });

    // ═══════════════════════════════════════════════════════════════════
    // KEYBOARD SHORTCUTS
    // ═══════════════════════════════════════════════════════════════════

    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      const key = e.key.toLowerCase();

      if (key === 'd') {
        downloadGlb();
      } else if (key === 'r') {
        toggleAutoRotate();
      } else if (key === 'f') {
        toggleFullscreen();
      }
    });

    // ── Controls button handlers ──

    toggleRotBtn.addEventListener('click', toggleAutoRotate);
    downloadBtn.addEventListener('click', downloadGlb);
    fullscreenBtn.addEventListener('click', toggleFullscreen);

    function toggleAutoRotate() {
      controls.autoRotate = !controls.autoRotate;
      if (controls.autoRotate) {
        controls.autoRotateSpeed = savedRotateSpeed;
        toggleRotBtn.classList.add('active');
      } else {
        controls.autoRotateSpeed = 0;
        toggleRotBtn.classList.remove('active');
      }
    }

    function downloadGlb() {
      if (currentGlbBlob) {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(currentGlbBlob);
        a.download = currentGlbBlob.name || 'model.glb';
        a.click();
      } else if (currentGlbUrl) {
        const a = document.createElement('a');
        a.href = currentGlbUrl;
        a.download = modelNameEl.textContent || 'model.glb';
        a.target = '_blank';
        a.click();
      }
    }

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(() => {});
      } else {
        document.exitFullscreen().catch(() => {});
      }
    }

    // ═══════════════════════════════════════════════════════════════════
    // RESIZE
    // ═══════════════════════════════════════════════════════════════════

    window.addEventListener('resize', () => {
      const w = window.innerWidth;
      const h = window.innerHeight;
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
      renderer.setSize(w, h);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      composer.setSize(w, h);
    });

    // ═══════════════════════════════════════════════════════════════════
    // ANIMATION LOOP
    // ═══════════════════════════════════════════════════════════════════

    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const elapsed = clock.getElapsedTime();
      controls.update();
      if (grainPass) grainPass.uniforms.time.value = elapsed;
      composer.render();
    }

    animate();

    // ═══════════════════════════════════════════════════════════════════
    // BOOT — load from URL param if present
    // ═══════════════════════════════════════════════════════════════════

    if (glbParam) {
      const urlName = glbParam.split('/').pop().replace(/\.glb$/i, '') || 'Model';
      loadGlb(glbParam, urlName);
    }
  </script>
</body>
</html>
