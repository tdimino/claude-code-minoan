<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Living Specimens — Mode 4</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            overflow: hidden;
            background: #050508;
            font-family: 'Space Mono', monospace;
            color: #e8e8f0;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100svh;
        }

        #instructions {
            position: fixed;
            top: 24px;
            left: 24px;
            font-size: 10px;
            letter-spacing: 0.2em;
            opacity: 0.5;
            pointer-events: none;
            z-index: 2;
        }

        #instructions .desktop { display: inline; }
        #instructions .mobile { display: none; }

        #loading {
            position: fixed;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            letter-spacing: 0.3em;
            opacity: 0.6;
            transition: opacity 0.8s ease;
            z-index: 5;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #webgl-fallback {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 40px;
            text-align: center;
            font-size: 13px;
            line-height: 1.8;
            letter-spacing: 0.05em;
            z-index: 50;
        }

        #webgl-fallback.visible {
            display: flex;
        }

        @media (max-width: 600px) {
            #instructions .desktop { display: none; }
            #instructions .mobile { display: inline; }
            #instructions { font-size: 9px; top: 16px; left: 16px; }
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>

    <div id="instructions">
        <span class="desktop">MOVE CURSOR · THEY FOLLOW · LEAVE · THEY RELEASE</span>
        <span class="mobile">TAP · THEY FOLLOW</span>
    </div>

    <div id="loading">AWAKENING</div>

    <div id="webgl-fallback">
        <div>
            WebGL is required to render living specimens.<br>
            Please enable WebGL in your browser, or try a different browser.
        </div>
    </div>

    <!-- ES module import map — Three.js r175 from jsdelivr -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.175.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.175.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        // ═══════════════════════════════════════════════════════════════════════
        // LIVING SPECIMENS — Mode 4
        // ═══════════════════════════════════════════════════════════════════════
        //
        // Vanilla port of celescript.dev/experiments/3d-butterfly. React + drei
        // stripped; the flight physics, lighting, and post-FX are preserved
        // with constants intact. glTF loader and animation mixer via three
        // examples/jsm ES modules. Default model is Three.js's official
        // Parrot.glb (MIT-licensed, served from jsdelivr).
        //
        // ═══════════════════════════════════════════════════════════════════════

        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { SkeletonUtils } from 'three/addons/utils/SkeletonUtils.js';
        import { PhosphorVigil } from './phosphor-vigil.js';

        // ─── Config ────────────────────────────────────────────────────────
        const CONFIG = {
            // Default model: Three.js's Parrot.glb (CC0, served by jsdelivr).
            // Swap for any rigged glTF/glb with an AnimationClip.
            modelUrl: 'https://cdn.jsdelivr.net/npm/three@0.175.0/examples/models/gltf/Parrot.glb',
            specimenCount: 3,
            behaviors: ['followMouse', 'wander', 'wander'],
            scales: [0.020, 0.018, 0.022],     // Parrot is bigger than a butterfly
            colorShifts: [0, 0.6, 0.05],
            flapSpeed: (i) => 2 + 0.3 * i,
            cameraPos: [0, 0, 5],
            cameraFov: 50,
            backgroundColor: 0x050508,
            fx: 'phosphor-vigil',              // 'phosphor-vigil' | 'none'
            mobileScale: 0.65,
            releaseDecayTime: 0.8,             // Seconds for follow blend to decay
        };

        // ─── Global state ──────────────────────────────────────────────────
        let scene, camera, renderer, clock;
        let fx = null;
        const specimens = [];
        const sharedVelocity = new THREE.Vector2(0, 0);
        const pointer = new THREE.Vector2(0, 0);
        let mousePresent = false;
        let isMobile = false;

        // ─── Init ──────────────────────────────────────────────────────────
        function init() {
            isMobile = window.matchMedia('(max-width: 768px)').matches;

            scene = new THREE.Scene();
            scene.background = new THREE.Color(CONFIG.backgroundColor);

            camera = new THREE.PerspectiveCamera(
                CONFIG.cameraFov,
                window.innerWidth / window.innerHeight,
                0.1,
                100
            );
            camera.position.set(...CONFIG.cameraPos);

            try {
                renderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: false,
                    failIfMajorPerformanceCaveat: false,
                });
            } catch (e) {
                showWebGLError();
                return;
            }
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // ─── Lights (match celescript butterfly) ─────────────────────
            scene.add(new THREE.AmbientLight(0xffffff, 2));

            const key = new THREE.DirectionalLight(0xffffff, 3);
            key.position.set(3, 5, 5);
            scene.add(key);

            const fill = new THREE.DirectionalLight(0x889bff, 1.5);
            fill.position.set(-3, -2, -5);
            scene.add(fill);

            const rim = new THREE.DirectionalLight(0xff8844, 1);
            rim.position.set(0, -3, 3);
            scene.add(rim);

            // ─── Load model, spawn specimens ─────────────────────────────
            loadModelAndSpawn();

            // ─── Optional FX ─────────────────────────────────────────────
            if (CONFIG.fx === 'phosphor-vigil') {
                fx = new PhosphorVigil(renderer, {
                    width: window.innerWidth,
                    height: window.innerHeight,
                });
            }

            setupEventListeners();
            animate();
        }

        // ─── Model loading ─────────────────────────────────────────────────
        function loadModelAndSpawn() {
            const loader = new GLTFLoader();
            loader.load(
                CONFIG.modelUrl,
                (gltf) => {
                    const sourceScene = gltf.scene;
                    const clips = gltf.animations || [];

                    const mobileMul = isMobile ? CONFIG.mobileScale : 1;

                    for (let i = 0; i < CONFIG.specimenCount; i++) {
                        const cloned = SkeletonUtils.clone(sourceScene);

                        // Per-instance emissive tint via HSL
                        const colorShift = CONFIG.colorShifts[i] || 0;
                        if (colorShift !== 0) {
                            cloned.traverse((obj) => {
                                if (obj.isMesh && obj.material) {
                                    const mat = obj.material.clone();
                                    mat.emissive = new THREE.Color().setHSL(colorShift, 0.3, 0.05);
                                    mat.emissiveIntensity = 1;
                                    obj.material = mat;
                                }
                            });
                        }

                        const scale = (CONFIG.scales[i] || CONFIG.scales[0]) * mobileMul;
                        cloned.scale.setScalar(scale);

                        const specimen = new Specimen({
                            root: cloned,
                            clips,
                            behavior: CONFIG.behaviors[i] || 'wander',
                            index: i,
                            flapSpeed: CONFIG.flapSpeed(i),
                        });
                        specimens.push(specimen);
                        scene.add(cloned);
                    }

                    document.getElementById('loading').classList.add('hidden');
                },
                undefined,
                (err) => {
                    console.error('Model load failed:', err);
                    document.getElementById('loading').textContent = 'MODEL LOAD FAILED';
                }
            );
        }

        // ─── Specimen class (flight physics) ───────────────────────────────
        class Specimen {
            constructor({ root, clips, behavior, index, flapSpeed }) {
                this.root = root;
                this.behavior = behavior;
                this.index = index;

                // Initial position scattered along X, slight Y offset by index
                this.position = new THREE.Vector3((index - 1) * 1.5, (index - 1) * 0.5, 0);
                this.velocity = new THREE.Vector3(0, 0, 0);
                this.target = new THREE.Vector3(0, 0, 0);
                this.smoothedSpeed = 0;

                // Wander baseline: random within view; regenerated periodically
                this.wanderBase = new THREE.Vector3(
                    (Math.random() - 0.5) * 2,
                    (Math.random() - 0.5) * 1,
                    0
                );
                this.wanderNextTime = 2 * Math.random();

                // Follow-blend state
                this.followBlend = 0;
                this.releaseStartTime = null;
                this.lastMousePresent = true;

                // Animation mixer
                this.mixer = new THREE.AnimationMixer(root);
                if (clips.length > 0) {
                    // Prefer clip[2] when available (celescript butterfly's
                    // "flap" animation sits at that index); otherwise the
                    // first clip. Same behavior as the original minified
                    // arithmetic, with the intent spelled out.
                    const clip = clips[2] || clips[0];
                    this.action = this.mixer.clipAction(clip);
                    this.action.setLoop(THREE.LoopRepeat, Infinity);
                    this.action.clampWhenFinished = false;
                    this.action.timeScale = flapSpeed;
                    this.action.play();
                }

                root.position.copy(this.position);
            }

            update(dt, elapsed, mousePresent, pointer, camera) {
                const lim = Math.min(dt, 0.05);

                // Compute viewport half-size at z=0 in world units
                const vFov = camera.fov * Math.PI / 180;
                const h = 2 * Math.tan(vFov / 2) * Math.abs(camera.position.z);
                const halfW = h * camera.aspect / 2;
                const halfH = h / 2;

                // ─── Follow blend (smooth transition follow ↔ wander) ────
                if (this.behavior === 'followMouse') {
                    if (!mousePresent && this.lastMousePresent) {
                        this.releaseStartTime = elapsed;
                    } else if (mousePresent && !this.lastMousePresent) {
                        this.releaseStartTime = null;
                    }
                    this.lastMousePresent = mousePresent;

                    if (mousePresent) {
                        this.followBlend = 1;
                    } else if (this.releaseStartTime !== null) {
                        this.followBlend = Math.max(
                            0,
                            1 - (elapsed - this.releaseStartTime) / CONFIG.releaseDecayTime
                        );
                    } else {
                        this.followBlend = 0;
                    }
                } else {
                    this.followBlend = 0;
                }
                const m = this.followBlend;

                // ─── Target point ────────────────────────────────────────
                // Project mouse NDC to z=0 plane via unproject
                const mouseWorld = new THREE.Vector3(pointer.x, pointer.y, 0.5);
                mouseWorld.unproject(camera);
                const rayDir = mouseWorld.sub(camera.position).normalize();
                const tOnPlane = -camera.position.z / rayDir.z;
                const mouseTarget = camera.position.clone().add(rayDir.multiplyScalar(tOnPlane));
                const mx = Math.max(-(0.9 * halfW), Math.min(0.9 * halfW, mouseTarget.x));
                const my = Math.max(-(0.7 * halfH), Math.min(0.7 * halfH, mouseTarget.y));

                if (m >= 0.99) {
                    this.target.set(mx, my, 0);
                } else {
                    if (elapsed > this.wanderNextTime) {
                        this.wanderBase.set(
                            (Math.random() - 0.5) * halfW * 1.2,
                            (Math.random() - 0.5) * halfH * 0.9,
                            0
                        );
                        this.wanderNextTime = elapsed + 2 + 3 * Math.random();
                    }
                    const jitter = new THREE.Vector3(
                        0.3 * Math.sin(0.7 * elapsed + 17 * this.index)
                            + 0.15 * Math.sin(1.3 * elapsed + 7 * this.index),
                        0.2 * Math.sin(0.5 * elapsed + 13 * this.index)
                            + 0.1 * Math.cos(1.1 * elapsed + 11 * this.index),
                        0
                    );
                    const wanderTarget = this.wanderBase.clone().add(jitter);
                    wanderTarget.x = Math.max(-(0.85 * halfW), Math.min(0.85 * halfW, wanderTarget.x));
                    wanderTarget.y = Math.max(-(0.65 * halfH), Math.min(0.65 * halfH, wanderTarget.y));
                    // Lerp between mouse target and wander target by blend
                    this.target.set(
                        mx * m + wanderTarget.x * (1 - m),
                        my * m + wanderTarget.y * (1 - m),
                        0
                    );
                }

                // ─── Acceleration toward target ──────────────────────────
                const toTarget = this.target.clone().sub(this.position);
                const dist = toTarget.length();
                const baseAccel = 5 + 3 * m;
                const distAccel = 2 + m;
                const accel = dist > 0.01
                    ? toTarget.normalize().multiplyScalar(baseAccel + dist * distAccel)
                    : new THREE.Vector3();

                // ─── Soft-wall repulsion ─────────────────────────────────
                const repel = new THREE.Vector3();
                const repelAxis = (v, limit) => {
                    const inner = 0.6 * limit;
                    if (Math.abs(v) > inner) {
                        const r = (Math.abs(v) - inner) / (limit - inner);
                        return -(r * r * 25 * Math.sign(v));
                    }
                    return 0;
                };
                repel.x = repelAxis(this.position.x, halfW);
                repel.y = repelAxis(this.position.y, halfH);
                accel.add(repel);

                // ─── Integrate velocity ──────────────────────────────────
                this.velocity.add(accel.multiplyScalar(lim));
                const damping = Math.exp(-(5 - m) * lim);
                this.velocity.multiplyScalar(damping);

                const maxV = 5 + 3 * m;
                const vLen = this.velocity.length();
                if (vLen > maxV) this.velocity.multiplyScalar(maxV / vLen);

                this.position.add(this.velocity.clone().multiplyScalar(lim));
                this.root.position.copy(this.position);

                // Face the direction of motion (yaw only)
                if (vLen > 0.1) {
                    const angle = Math.atan2(this.velocity.x, this.velocity.y) - Math.PI / 2;
                    this.root.rotation.y = angle;
                }

                // ─── Velocity → animation timeScale (faster flight = faster flap)
                const speed = this.velocity.length();
                this.smoothedSpeed += (speed - this.smoothedSpeed) * 0.1;
                if (this.action) {
                    this.action.timeScale = (2 + 0.3 * this.index) + this.smoothedSpeed * 0.3;
                }

                // ─── Contribute to shared velocity channel (feeds FX) ────
                sharedVelocity.x += 0.012 * this.velocity.x * this.smoothedSpeed;
                sharedVelocity.y += 0.012 * this.velocity.y * this.smoothedSpeed;

                this.mixer.update(lim);
            }
        }

        // ─── Event listeners ───────────────────────────────────────────────
        // All pointer tracking is scoped to the canvas element, not window.
        // Using window for mousemove while canvas owns mouseleave creates a
        // race: mouseleave fires when the cursor crosses onto a sibling
        // overlay (#instructions, #loading), then the next window mousemove
        // flips mousePresent back to true — the release animation never
        // plays. Touch uses a tracked identifier so multi-finger input
        // doesn't re-index to a different finger mid-gesture.
        let activeTouchId = null;

        function updatePointerFromClient(clientX, clientY) {
            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        }

        function setupEventListeners() {
            const canvas = renderer.domElement;

            canvas.addEventListener('mouseenter', (e) => {
                mousePresent = true;
                updatePointerFromClient(e.clientX, e.clientY);
            });
            canvas.addEventListener('mousemove', (e) => {
                updatePointerFromClient(e.clientX, e.clientY);
            });
            canvas.addEventListener('mouseleave', () => { mousePresent = false; });

            canvas.addEventListener('touchstart', (e) => {
                if (activeTouchId === null && e.changedTouches.length > 0) {
                    const t = e.changedTouches[0];
                    activeTouchId = t.identifier;
                    updatePointerFromClient(t.clientX, t.clientY);
                    mousePresent = true;
                    e.preventDefault();
                }
            }, { passive: false });

            canvas.addEventListener('touchmove', (e) => {
                for (const t of e.changedTouches) {
                    if (t.identifier === activeTouchId) {
                        updatePointerFromClient(t.clientX, t.clientY);
                        e.preventDefault();
                        break;
                    }
                }
            }, { passive: false });

            const endTouch = (e) => {
                for (const t of e.changedTouches) {
                    if (t.identifier === activeTouchId) {
                        activeTouchId = null;
                        mousePresent = false;
                        break;
                    }
                }
            };
            canvas.addEventListener('touchend', endTouch, { passive: true });
            canvas.addEventListener('touchcancel', endTouch, { passive: true });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                if (fx) fx.setSize(window.innerWidth, window.innerHeight);
                isMobile = window.matchMedia('(max-width: 768px)').matches;
            });
        }

        // ─── Animation loop ────────────────────────────────────────────────
        function animate() {
            requestAnimationFrame(animate);

            const dt = clock.getDelta();
            const elapsed = clock.getElapsedTime();

            // Decay shared velocity each frame (specimens re-add their contribution)
            sharedVelocity.multiplyScalar(0.85);

            for (const s of specimens) {
                s.update(dt, elapsed, mousePresent, pointer, camera);
            }

            if (fx) {
                fx.setVelocity(sharedVelocity);
                fx.render(scene, camera, elapsed);
            } else {
                renderer.render(scene, camera);
            }
        }

        function showWebGLError() {
            document.getElementById('webgl-fallback').classList.add('visible');
            document.getElementById('loading').classList.add('hidden');
        }

        // ─── Boot ──────────────────────────────────────────────────────────
        init();
    </script>
</body>
</html>
