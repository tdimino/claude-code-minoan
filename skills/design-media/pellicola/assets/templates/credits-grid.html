<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Film Title — Credits</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --pel-cream: oklch(97.5% 0.012 85);
      --pel-cream-deep: oklch(95% 0.015 80);
      --pel-ink: oklch(15% 0.005 80);
      --pel-ink-muted: oklch(40% 0.01 80);
      --pel-ink-light: oklch(98% 0 0);
      --pel-border: oklch(85% 0.01 80);
      --pel-font-display: 'Playfair Display', 'Cormorant Garamond', serif;
      --pel-font-body: 'DM Sans', 'Outfit', sans-serif;
      --pel-ease: cubic-bezier(.19, 1, .22, 1);
      --pel-duration: 0.8s;
      --pel-duration-short: 0.4s;
      --pel-content-pad: clamp(1.5rem, 4vw, 3rem);
      --pel-max-width: 1200px;
      --pel-frame-radius: 8px;
      --pel-stagger-delay: 0.1s;
    }

    body {
      font-family: var(--pel-font-body);
      background: var(--pel-cream);
      color: var(--pel-ink);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .pel-skip-link {
      position: fixed; top: -100%; left: 1rem; z-index: 100;
      padding: 0.5rem 1rem; background: var(--pel-ink); color: var(--pel-ink-light);
      font-family: var(--pel-font-body); text-decoration: none; border-radius: 4px;
    }
    .pel-skip-link:focus { top: 1rem; }

    .pel-container {
      max-width: var(--pel-max-width);
      margin: 0 auto;
      padding: clamp(4rem, 8vw, 8rem) var(--pel-content-pad);
    }

    .pel-divider {
      display: flex; align-items: center; gap: 1rem;
      margin-bottom: clamp(1.5rem, 3vw, 2.5rem);
    }
    .pel-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--pel-border);
      transform-origin: left center;
    }
    .pel-divider__label {
      font-size: 0.6875rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--pel-ink-muted); flex-shrink: 0;
    }

    .pel-director {
      max-width: 500px; margin-bottom: clamp(2rem, 4vw, 3rem);
    }
    .pel-director__image {
      position: relative; overflow: hidden;
      border-radius: var(--pel-frame-radius);
    }
    .pel-director__image img {
      width: 100%; display: block;
      aspect-ratio: 3 / 4; object-fit: cover;
    }
    .pel-director__overlay {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: clamp(1.5rem, 3vw, 2.5rem);
      background: linear-gradient(to top, oklch(0% 0 0 / 0.7) 0%, transparent 60%);
      z-index: 10;
    }
    .pel-director__role {
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: oklch(90% 0 0); margin-bottom: 0.25rem;
    }
    .pel-director__name {
      font-family: var(--pel-font-display);
      font-size: clamp(1.5rem, 3vw, 2.5rem); font-weight: 400;
      color: var(--pel-ink-light);
    }

    .pel-credits {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      border-top: 1px solid var(--pel-border);
      border-left: 1px solid var(--pel-border);
    }
    .pel-credits__cell {
      padding: clamp(1rem, 2vw, 1.5rem);
      border-right: 1px solid var(--pel-border);
      border-bottom: 1px solid var(--pel-border);
    }
    .pel-credits__role {
      font-size: 0.75rem; font-weight: 500;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--pel-ink-muted); margin-bottom: 0.5rem;
    }
    .pel-credits__name {
      font-family: var(--pel-font-display);
      font-size: clamp(1.25rem, 2vw, 1.75rem); font-weight: 400;
      line-height: 1.2; color: var(--pel-ink);
    }

    @media (max-width: 1024px) {
      .pel-credits { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .pel-credits { grid-template-columns: 1fr; }
    }

    /* Animation */
    [data-pel] { opacity: 0; transition: opacity var(--pel-duration) var(--pel-ease), transform var(--pel-duration) var(--pel-ease); }
    [data-pel="y"] { transform: translateY(40px); }
    [data-pel="alpha"] { transform: none; }
    [data-pel="line"]::after { transform: scaleX(0); transition: transform var(--pel-duration) var(--pel-ease); }
    [data-pel="line"].is-visible { opacity: 1; }
    [data-pel="line"].is-visible::after { transform: scaleX(1); }
    [data-pel].is-visible { opacity: 1; transform: none; }
    [data-pel="stagger"] > * {
      opacity: 0; transform: translateY(20px);
      transition: opacity var(--pel-duration) var(--pel-ease), transform var(--pel-duration) var(--pel-ease);
    }
    [data-pel="stagger"].is-visible > * { opacity: 1; transform: none; }

    @media (prefers-reduced-motion: reduce) {
      [data-pel], [data-pel="stagger"] > * {
        opacity: 1 !important; transform: none !important; transition: none !important;
      }
      [data-pel="line"]::after { transform: scaleX(1) !important; transition: none !important; }
    }
  </style>
</head>
<body>
  <a href="#main" class="pel-skip-link">Skip to content</a>

  <main id="main">
    <div class="pel-container">
      <section class="pel-section" id="credits" aria-label="Credits">
        <div class="pel-divider" data-pel="line">
          <span class="pel-divider__label">Credits</span>
        </div>

        <div class="pel-director" data-pel="y">
          <div class="pel-director__image">
            <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&h=800&fit=crop" alt="Portrait of Shauly Melamed">
            <div class="pel-director__overlay">
              <p class="pel-director__role">Director</p>
              <h3 class="pel-director__name">Shauly Melamed</h3>
            </div>
          </div>
        </div>

        <div class="pel-credits" data-pel="stagger">
          <div class="pel-credits__cell">
            <p class="pel-credits__role">Executive Producer</p>
            <p class="pel-credits__name">Rachel Levy</p>
          </div>
          <div class="pel-credits__cell">
            <p class="pel-credits__role">Executive Producer</p>
            <p class="pel-credits__name">David Stern</p>
          </div>
          <div class="pel-credits__cell">
            <p class="pel-credits__role">Producer</p>
            <p class="pel-credits__name">Maya Cohen</p>
          </div>
          <div class="pel-credits__cell">
            <p class="pel-credits__role">Editor</p>
            <p class="pel-credits__name">Alex Rivera</p>
          </div>
          <div class="pel-credits__cell">
            <p class="pel-credits__role">Cinematographer</p>
            <p class="pel-credits__name">Tomás Herrera</p>
          </div>
          <div class="pel-credits__cell">
            <p class="pel-credits__role">Music</p>
            <p class="pel-credits__name">Noa Wildschut</p>
          </div>
        </div>
      </section>
    </div>
  </main>

  <script>
    (function() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('is-visible');
            if (entry.target.dataset.pel === 'stagger') {
              Array.from(entry.target.children).forEach((child, i) => {
                child.style.transitionDelay = `${i * 0.1}s`;
              });
            }
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.15 });

      document.querySelectorAll('[data-pel]').forEach(el => observer.observe(el));
    })();
  </script>
</body>
</html>
